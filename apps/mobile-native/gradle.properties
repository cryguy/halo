org.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8
org.gradle.caching=true
org.gradle.configuration-cache=true
kotlin.code.style=official
kotlin.mpp.applyDefaultHierarchyTemplate=true
kotlin.native.ignoreDisabledTargets=true
android.useAndroidX=true
android.nonTransitiveRClass=true
# AGP 9 dropped com.android.application + KMP coexistence; these revert to the
# AGP-8 behavior so the single composeApp module can host the Android app too.
# No-ops for the iOS build path, which never applies the Android plugin.
android.builtInKotlin=false
android.newDsl=false
